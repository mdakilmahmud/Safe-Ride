{% extends "base.html" %}
{% block content %}

<div class="min-h-screen flex items-center justify-center px-4 py-12" style="background: var(--bg);">
    <div class="w-full max-w-md animate-fade-up">
        <div class="text-center mb-8">
            <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-3">🔑</div>
            <h2 class="text-3xl font-extrabold mb-1" style="color: var(--text-primary);">Welcome Back</h2>
            <p class="text-sm" style="color: var(--text-secondary);">Log in to your SafeRide account</p>
        </div>

        <div class="page-card">
            <form action="/login" method="POST" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                {% if error %}
                <div class="bg-red-50 border border-red-200 text-red-600 rounded-lg px-4 py-2 mb-4 text-sm">
                    {{ error }}
                </div>
                {% endif %}
                <div>
                    <input type="text" name="identifier" placeholder="Email or Phone Number" required class="input-field"/>
                    <p class="text-xs mt-1" style="color: var(--text-muted);">You can log in with your email or 11-digit phone number.</p>
                </div>
                <div class="relative">
                    <input type="password" name="password" id="password" placeholder="Password" required class="input-field pr-10"/>
                    <button type="button" onclick="togglePassword('password','eyeIcon1')" class="absolute right-3 top-2.5 text-gray-400 hover:text-gray-600">
                        <svg id="eyeIcon1" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
                <button type="submit" class="btn-primary w-full py-3">Log In</button>
            </form>

            <p class="text-center text-sm mt-4" style="color: var(--text-secondary);">
                Don't have an account? <a href="/signup" class="text-blue-600 hover:underline font-medium">Sign up</a>
            </p>
        </div>
    </div>
</div>

<script>
function togglePassword(fieldId, iconId) {
    const field = document.getElementById(fieldId);
    const icon = document.getElementById(iconId);
    if (field.type === 'password') {
        field.type = 'text';
        icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21" />`;
    } else {
        field.type = 'password';
        icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
    }
}
</script>

{% endblock %}
